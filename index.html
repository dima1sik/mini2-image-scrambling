<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini 2 - Image Scrambling</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Mini 2 - Image Scrambling</h1>

    <div class="controls">
      <div class="control-block">
        <label for="imageInput">Wczytaj obraz:</label>
        <input type="file" id="imageInput" accept="image/png, image/jpeg, image/bmp" />
      </div>

      <div class="control-block">
        <label for="stageSelect">Etap:</label>
        <select id="stageSelect">
          <option value="1">Etap 1 - Naiwny scrambling</option>
          <option value="2">Etap 2 - Czysta permutacja</option>
          <option value="3">Etap 3 - Wersja wzmocniona</option>
        </select>
      </div>

      <div class="control-block">
        <label for="seedInput">Poprawny klucz / seed:</label>
        <input type="text" id="seedInput" value="12345" />
      </div>

      <div class="control-block">
        <label for="wrongSeedInput">Błędny klucz / seed:</label>
        <input type="text" id="wrongSeedInput" value="12346" />
      </div>

      <div class="control-block buttons-block">
        <button id="scrambleBtn">Scramble</button>
        <button id="unscrambleBtn">Unscramble</button>
        <button id="wrongUnscrambleBtn">Unscramble (błędny klucz)</button>
        <button id="saveScrambledBtn">Zapisz scrambled</button>
        <button id="saveRestoredBtn">Zapisz restored</button>
        <button id="saveDifferenceBtn">Zapisz difference</button>
      </div>
    </div>

    <div class="images images-four">
      <div class="panel">
        <h2>Obraz oryginalny</h2>
        <canvas id="originalCanvas"></canvas>
      </div>

      <div class="panel">
        <h2>Obraz scrambled</h2>
        <canvas id="scrambledCanvas"></canvas>
      </div>

      <div class="panel">
        <h2>Obraz restored</h2>
        <canvas id="restoredCanvas"></canvas>
      </div>

      <div class="panel">
        <h2>Difference</h2>
        <canvas id="differenceCanvas"></canvas>
      </div>
    </div>

    <div class="status">
      <p id="statusText">Status: oczekiwanie na wczytanie obrazu</p>
    </div>

    <div class="metrics">
      <h2>Metryki</h2>

      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Korelacja pozioma (oryginał)</div>
          <div class="metric-value" id="originalCorrValue">-</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Korelacja pozioma (scrambled)</div>
          <div class="metric-value" id="scrambledCorrValue">-</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Tryb ostatniego odtworzenia</div>
          <div class="metric-value" id="restoreModeValue">-</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">MSE restored vs original</div>
          <div class="metric-value" id="restoredMseValue">-</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Czy restored = original</div>
          <div class="metric-value" id="exactRestoreValue">-</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
